<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Unauthorised</title>
    <link rel="icon" type="img/ico" href="/mockpass/resources/img/favicon.ico">
    <link rel="stylesheet" type="text/css" href="/mockpass/resources/plugins/bootstrap-3.4.1/css/bootstrap.min.css" media="all">
    <link rel="stylesheet" type="text/css" href="/mockpass/resources/css/style-main.css" media="all">
    <link rel="stylesheet" type="text/css" href="/mockpass/resources/css/common.css" media="all">
    <style>
      body {
        background: #f7f7f7;
        color: #2a2d33;
      }

      .unauthorised-page {
        align-items: center;
        display: flex;
        min-height: 100vh;
        padding: 24px;
      }

      .unauthorised-panel {
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 5px;
        margin: 0 auto;
        max-width: 520px;
        padding: 32px;
        text-align: center;
        width: 100%;
      }

      .unauthorised-panel h1 {
        font-size: 28px;
        font-weight: 600;
        margin: 0 0 12px;
      }

      .unauthorised-panel p {
        color: #555;
        font-size: 16px;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <main class="unauthorised-page">
      <section class="unauthorised-panel" aria-labelledby="unauthorised-title">
        <h1 id="unauthorised-title">Unauthorised</h1>
        <p>You are not authorised to continue with this login request.</p>
      </section>
    </main>
  </body>
</html>
